<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Exemplo CSS</title>

  <!-- CSS INTERNO -->
  <style>
    /* 1. Seletor de elemento */
    p {
      color: red;
    }

    /* 2. Seletor de classe */
    .destaque {
      background-color: yellow;
    }

    /* 3. Seletor de ID */
    #titulo {
      color: blue;
      text-align: center;
    }

    /* 4. Seletor descendente */
    div p {
      font-style: italic;
    }

    /* 5. Pseudo-classe */
    a:hover {
      color: green;
    }
  </style>

</head>
<body>

  <h1 id="titulo">Exemplo de CSS Interno</h1>

  <p>Este é um parágrafo comum.</p>

  <p class="destaque">Este parágrafo usa classe.</p>

  <div>
    <p>Este parágrafo está dentro de uma div (descendente).</p>
  </div>

  <a href="#">Passe o mouse aqui</a>

</body>
</html>
